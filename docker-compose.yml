# ================================================
# GenAI Energy Analytics - Docker Compose
# ================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f api    # View API logs
# ================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: energyops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-energyops_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energyops-api
    restart: unless-stopped
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-energyops_db}
      - POSTGRES_PORT=5432
      - HF_TOKEN=${HF_TOKEN:-}
      - BACKEND_CORS_ORIGINS=["http://localhost"]
    # Port NOT exposed publicly — nginx proxies instead
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:8000
    container_name: energyops-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (single public entry point)
  nginx:
    image: nginx:alpine
    container_name: energyops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: energyops-mlflow
    restart: unless-stopped
    command: >
      bash -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000"
    expose:
      - "5000"
    volumes:
      - ./mlruns:/mlruns
    environment:
      - MLFLOW_TRACKING_URI=/mlruns

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: energyops-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - api

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: energyops-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_SERVER_ROOT_URL=http://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
